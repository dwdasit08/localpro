services:
  - type: web
    name: localpro-hub-backend
    runtime: node
    repo: https://github.com/yourusername/localpro-hub # replace
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 5000
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /
    autoDeploy: true