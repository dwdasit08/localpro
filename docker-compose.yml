version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: localpro-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
    networks:
      - localpro-net

  backend:
    build: .
    container_name: localpro-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://admin:secret@mongo:27017/localprohub?authSource=admin
      - JWT_SECRET=your_super_secret_jwt_key_change_this_in_production
    depends_on:
      - mongo
    networks:
      - localpro-net

volumes:
  mongo-data:

networks:
  localpro-net:
    driver: bridge