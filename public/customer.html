<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>LocalPro Hub - Find Services Near You</title>
  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <style>
    /* Custom styles */
    body { background: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .primary-bg { background-color: #1E3A8A; }
    .accent-bg { background-color: #F59E0B; }
    .accent-text { color: #F59E0B; }
    .primary-text { color: #1E3A8A; }
    .card-hover:hover { transform: scale(1.02); transition: 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    #map { height: 300px; width: 100%; border-radius: 12px; z-index: 0; }
    .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    .modal-card { max-height: 90vh; overflow-y: auto; }
    .star { color: #F59E0B; }
    .filter-bar select, .filter-bar input { border-radius: 8px; border: 1px solid #ddd; padding: 6px 12px; }
    .service-card { transition: all 0.2s; }
    .book-btn { background: #1E3A8A; color: white; }
    .book-btn:hover { background: #15307a; }
    .cod-badge { background: #10b981; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; }
    .nav-tab { cursor: pointer; padding: 10px 16px; border-bottom: 3px solid transparent; }
    .nav-tab.active { border-bottom-color: #1E3A8A; color: #1E3A8A; font-weight: 600; }
    .hidden-tab { display: none; }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="primary-bg text-white p-4 shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between">
      <div class="flex items-center space-x-2">
        <i class="fas fa-tools text-2xl accent-text"></i>
        <h1 class="text-xl font-bold">LocalPro Hub</h1>
      </div>
      <div class="flex items-center space-x-2 mt-2 sm:mt-0">
        <input id="pincodeInput" type="text" placeholder="Enter Pincode" class="p-2 rounded-lg border-0 text-gray-800 w-32 sm:w-48" />
        <button id="searchBtn" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg transition"><i class="fas fa-search"></i></button>
        <button id="locateBtn" class="bg-gray-700 hover:bg-gray-800 text-white px-3 py-2 rounded-lg text-sm"><i class="fas fa-location-dot"></i></button>
        <span id="userGreeting" class="text-sm hidden sm:inline"></span>
      </div>
    </div>
  </header>

  <!-- Tabs: Services | History -->
  <div class="max-w-7xl mx-auto px-4 mt-4">
    <div class="flex border-b border-gray-300">
      <span class="nav-tab active" data-tab="servicesTab"><i class="fas fa-list-ul mr-1"></i> Services</span>
      <span class="nav-tab" data-tab="historyTab"><i class="fas fa-clock mr-1"></i> Order History</span>
    </div>
  </div>

  <!-- Services Tab -->
  <div id="servicesTab" class="tab-content max-w-7xl mx-auto px-4 py-4">
    <!-- Map -->
    <div id="map" class="mb-4 shadow-md"></div>

    <!-- Filter/Sort Bar -->
    <div class="filter-bar flex flex-wrap gap-2 items-center justify-between bg-white p-3 rounded-lg shadow mb-4">
      <div class="flex flex-wrap gap-2">
        <select id="sortSelect" class="border-gray-300">
          <option value="rating">Sort by: Rating (High)</option>
          <option value="distance">Sort by: Distance (Near)</option>
          <option value="price">Sort by: Price (Low)</option>
        </select>
        <select id="categoryFilter" class="border-gray-300">
          <option value="">All Categories</option>
          <option value="Electrician">Electrician</option>
          <option value="Plumber">Plumber</option>
          <option value="Doctor">Doctor</option>
          <option value="Carpenter">Carpenter</option>
          <option value="Painter">Painter</option>
          <option value="Mechanic">Mechanic</option>
        </select>
      </div>
      <div class="text-sm text-gray-600">
        <span id="resultCount">0</span> providers found
      </div>
    </div>

    <!-- Provider Cards -->
    <div id="providerCards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- Cards rendered by JS -->
    </div>
  </div>

  <!-- History Tab -->
  <div id="historyTab" class="tab-content hidden-tab max-w-7xl mx-auto px-4 py-4">
    <h2 class="text-xl font-semibold mb-4">Your Bookings</h2>
    <div id="historyList" class="space-y-3">
      <!-- Rendered by JS -->
      <p class="text-gray-500">Enter your phone or email to view history.</p>
      <div class="flex gap-2 mt-2">
        <input id="historyEmail" type="email" placeholder="Email" class="border p-2 rounded flex-1" />
        <input id="historyPhone" type="text" placeholder="Phone" class="border p-2 rounded flex-1" />
        <button id="fetchHistoryBtn" class="bg-blue-700 text-white px-4 py-2 rounded">Fetch</button>
      </div>
    </div>
  </div>

  <!-- Booking Modal -->
  <div id="bookingModal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
    <div class="modal-card bg-white rounded-xl shadow-2xl max-w-md w-full p-6 relative">
      <button id="closeModalBtn" class="absolute top-3 right-3 text-gray-500 hover:text-gray-700"><i class="fas fa-times text-xl"></i></button>
      <h2 class="text-2xl font-bold mb-4">Book Service</h2>
      <div id="bookingProviderInfo" class="mb-4 p-3 bg-gray-50 rounded">
        <!-- Dynamic -->
      </div>
      <form id="bookingForm">
        <div class="mb-3">
          <label class="block text-sm font-medium">Your Name *</label>
          <input type="text" id="custName" required class="w-full border rounded p-2" placeholder="John Doe" />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium">Phone *</label>
          <input type="tel" id="custPhone" required class="w-full border rounded p-2" placeholder="9876543210" />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium">Email *</label>
          <input type="email" id="custEmail" required class="w-full border rounded p-2" placeholder="john@example.com" />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium">Pincode *</label>
          <input type="text" id="custPincode" required class="w-full border rounded p-2" placeholder="110001" />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium">Date *</label>
          <input type="date" id="bookingDate" required class="w-full border rounded p-2" />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium">Time *</label>
          <input type="time" id="bookingTime" required class="w-full border rounded p-2" />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium">Payment Method</label>
          <div class="flex flex-wrap gap-4">
            <label><input type="radio" name="paymentMethod" value="UPI" checked /> UPI</label>
            <label><input type="radio" name="paymentMethod" value="Card" /> Card</label>
            <label><input type="radio" name="paymentMethod" value="COD" /> Cash on Delivery</label>
          </div>
        </div>
        <!-- UPI/Card OTP section (hidden if COD) -->
        <div id="otpSection" class="mb-3">
          <label class="block text-sm font-medium">Enter OTP (demo: 1234)</label>
          <input type="text" id="otpInput" class="w-full border rounded p-2" placeholder="1234" />
        </div>
        <div class="flex justify-between items-center">
          <span class="font-bold text-lg">Amount: ₹<span id="bookingAmount">0</span></span>
          <button type="submit" class="book-btn px-6 py-2 rounded-lg font-semibold transition">Confirm Booking</button>
        </div>
      </form>
      <div id="bookingMessage" class="mt-3 text-center text-sm"></div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script>
    // --- Global State ---
    let map = null;
    let markers = [];
    let currentServices = [];
    let userLat = null, userLng = null;
    let userPincode = '';

    // DOM refs
    const mapContainer = document.getElementById('map');
    const pincodeInput = document.getElementById('pincodeInput');
    const searchBtn = document.getElementById('searchBtn');
    const locateBtn = document.getElementById('locateBtn');
    const sortSelect = document.getElementById('sortSelect');
    const categoryFilter = document.getElementById('categoryFilter');
    const providerCards = document.getElementById('providerCards');
    const resultCount = document.getElementById('resultCount');
    const bookingModal = document.getElementById('bookingModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const bookingForm = document.getElementById('bookingForm');
    const bookingProviderInfo = document.getElementById('bookingProviderInfo');
    const bookingAmount = document.getElementById('bookingAmount');
    const custName = document.getElementById('custName');
    const custPhone = document.getElementById('custPhone');
    const custEmail = document.getElementById('custEmail');
    const custPincode = document.getElementById('custPincode');
    const bookingDate = document.getElementById('bookingDate');
    const bookingTime = document.getElementById('bookingTime');
    const otpSection = document.getElementById('otpSection');
    const otpInput = document.getElementById('otpInput');
    const bookingMessage = document.getElementById('bookingMessage');
    const historyTab = document.getElementById('historyTab');
    const servicesTab = document.getElementById('servicesTab');
    const historyList = document.getElementById('historyList');
    const fetchHistoryBtn = document.getElementById('fetchHistoryBtn');
    const historyEmail = document.getElementById('historyEmail');
    const historyPhone = document.getElementById('historyPhone');

    let selectedServiceId = null;
    let selectedPrice = 0;

    // --- Tabs ---
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const target = this.dataset.tab;
        document.querySelectorAll('.tab-content').forEach(tc => tc.classList.add('hidden-tab'));
        document.getElementById(target).classList.remove('hidden-tab');
        // If history tab, maybe auto-fetch? We'll let user click fetch.
      });
    });

    // --- Geolocation & Map ---
    function initMap(lat, lng) {
      if (map) {
        map.setView([lat, lng], 13);
        return;
      }
      map = L.map('map').setView([lat, lng], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
      // Add a marker for user location
      L.marker([lat, lng], { icon: L.divIcon({ className: 'bg-blue-500 rounded-full w-4 h-4 border-2 border-white', iconSize: [16,16] }) })
        .addTo(map)
        .bindPopup('You are here');
    }

    function getUserLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => {
            userLat = pos.coords.latitude;
            userLng = pos.coords.longitude;
            initMap(userLat, userLng);
            // Also try to get pincode via reverse geocoding? We'll skip, user enters manually.
            // But we can use the pincode input.
            if (pincodeInput.value.trim() === '') {
              // Optionally fetch pincode from lat/lng using Nominatim? For simplicity, we don't.
            }
            // After location, load services with current pincode if any
            loadServices();
          },
          err => {
            console.warn('Geolocation error:', err);
            // fallback to default location (e.g., Delhi)
            userLat = 28.6139;
            userLng = 77.2090;
            initMap(userLat, userLng);
            loadServices();
          }
        );
      } else {
        alert('Geolocation not supported');
        userLat = 28.6139;
        userLng = 77.2090;
        initMap(userLat, userLng);
        loadServices();
      }
    }

    // --- Load Services ---
    async function loadServices() {
      const pincode = pincodeInput.value.trim() || '';
      const category = categoryFilter.value || '';
      let url = `/api/services?pincode=${pincode}&category=${category}`;
      if (userLat && userLng) {
        url += `&lat=${userLat}&lng=${userLng}`;
      }
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('Failed to fetch services');
        const services = await res.json();
        currentServices = services;
        renderServices(services);
        updateMapMarkers(services);
        resultCount.textContent = services.length;
      } catch (err) {
        console.error(err);
        providerCards.innerHTML = '<p class="text-red-500">Failed to load services. Please try again.</p>';
      }
    }

    // --- Render Cards ---
    function renderServices(services) {
      if (services.length === 0) {
        providerCards.innerHTML = '<p class="text-gray-500 col-span-full text-center py-8">No providers found in your area.</p>';
        return;
      }
      // Sort according to sortSelect
      const sortBy = sortSelect.value;
      let sorted = [...services];
      if (sortBy === 'rating') {
        sorted.sort((a,b) => (b.sellerId.rating || 0) - (a.sellerId.rating || 0));
      } else if (sortBy === 'distance') {
        sorted.sort((a,b) => (a.distance ?? Infinity) - (b.distance ?? Infinity));
      } else if (sortBy === 'price') {
        sorted.sort((a,b) => a.price - b.price);
      }
      // Build cards
      providerCards.innerHTML = sorted.map(s => {
        const rating = s.sellerId.rating || 0;
        const stars = '★'.repeat(Math.floor(rating)) + '☆'.repeat(5 - Math.floor(rating));
        const dist = s.distance !== null ? s.distance.toFixed(1) + ' km' : 'N/A';
        return `
          <div class="service-card bg-white rounded-xl shadow p-4 card-hover">
            <div class="flex items-start justify-between">
              <div>
                <h3 class="text-lg font-semibold">${s.sellerId.name || 'Provider'}</h3>
                <p class="text-sm text-gray-600">${s.category}</p>
              </div>
              <span class="text-yellow-500 text-sm">${stars} (${s.sellerId.totalReviews || 0})</span>
            </div>
            <div class="flex justify-between items-center mt-2 text-sm">
              <span><i class="fas fa-map-pin"></i> ${dist}</span>
              <span class="font-bold text-blue-700">₹${s.price}</span>
            </div>
            <button class="book-btn w-full mt-3 py-2 rounded-lg font-medium transition" data-serviceid="${s._id}" data-price="${s.price}" data-name="${s.sellerId.name}" data-category="${s.category}">
              <i class="fas fa-calendar-check mr-1"></i> Book Now
            </button>
          </div>
        `;
      }).join('');

      // Attach event listeners to book buttons
      document.querySelectorAll('.book-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const sid = this.dataset.serviceid;
          const price = this.dataset.price;
          const name = this.dataset.name;
          const category = this.dataset.category;
          openBookingModal(sid, price, name, category);
        });
      });
    }

    // --- Update Map Markers ---
    function updateMapMarkers(services) {
      if (!map) return;
      // Clear existing markers (except user marker)
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      services.forEach(s => {
        if (s.lat && s.lng) {
          const marker = L.marker([s.lat, s.lng])
            .addTo(map)
            .bindPopup(`<b>${s.sellerId.name}</b><br>${s.category}<br>₹${s.price}<br><button class="book-btn-popup" data-id="${s._id}" style="background:#1E3A8A;color:white;padding:4px 12px;border-radius:6px;margin-top:4px;">Book</button>`);
          markers.push(marker);
          // Add popup event for book button
          marker.on('popupopen', function() {
            const popupBtn = document.querySelector('.book-btn-popup');
            if (popupBtn) {
              popupBtn.addEventListener('click', function() {
                const sid = this.dataset.id;
                const service = services.find(s => s._id === sid);
                if (service) {
                  openBookingModal(sid, service.price, service.sellerId.name, service.category);
                }
              });
            }
          });
        }
      });
      // Fit bounds to markers
      if (markers.length > 0) {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds(), { padding: [20, 20] });
      } else {
        if (userLat && userLng) map.setView([userLat, userLng], 13);
      }
    }

    // --- Booking Modal ---
    function openBookingModal(serviceId, price, name, category) {
      selectedServiceId = serviceId;
      selectedPrice = price;
      bookingProviderInfo.innerHTML = `
        <p><strong>${name}</strong> - ${category}</p>
        <p class="text-lg font-bold">₹${price}</p>
      `;
      bookingAmount.textContent = price;
      // Set default date (tomorrow)
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      bookingDate.value = tomorrow.toISOString().split('T')[0];
      bookingTime.value = '10:00';
      // Reset form
      bookingForm.reset();
      otpInput.value = '';
      bookingMessage.textContent = '';
      // Show OTP section only if not COD
      document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
        radio.addEventListener('change', function() {
          if (this.value === 'COD') {
            otpSection.style.display = 'none';
          } else {
            otpSection.style.display = 'block';
          }
        });
      });
      // Default: UPI selected, show OTP
      const defaultRadio = document.querySelector('input[name="paymentMethod"][value="UPI"]');
      if (defaultRadio) defaultRadio.checked = true;
      otpSection.style.display = 'block';
      // Show modal
      bookingModal.classList.remove('hidden');
    }

    function closeModal() {
      bookingModal.classList.add('hidden');
    }

    closeModalBtn.addEventListener('click', closeModal);
    bookingModal.addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // --- Booking Form Submit ---
    bookingForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = custName.value.trim();
      const phone = custPhone.value.trim();
      const email = custEmail.value.trim();
      const pincode = custPincode.value.trim();
      const date = bookingDate.value;
      const time = bookingTime.value;
      const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;
      const isCOD = paymentMethod === 'COD';
      // Validate
      if (!name || !phone || !email || !pincode || !date || !time) {
        bookingMessage.textContent = 'Please fill all required fields.';
        bookingMessage.className = 'text-red-500';
        return;
      }
      // If not COD, validate OTP
      let otp = null;
      if (!isCOD) {
        otp = otpInput.value.trim();
        if (otp !== '1234') {
          bookingMessage.textContent = 'Invalid OTP. Use 1234 for demo.';
          bookingMessage.className = 'text-red-500';
          return;
        }
        // Simulate payment
        try {
          const payRes = await fetch('/api/payment/simulate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: selectedPrice, method: paymentMethod, otp })
          });
          const payData = await payRes.json();
          if (!payData.success) {
            bookingMessage.textContent = payData.message || 'Payment failed';
            bookingMessage.className = 'text-red-500';
            return;
          }
          // Payment success, proceed to create booking
        } catch (err) {
          bookingMessage.textContent = 'Payment simulation error';
          bookingMessage.className = 'text-red-500';
          return;
        }
      }
      // Create booking
      try {
        const bookingData = {
          serviceId: selectedServiceId,
          date,
          time,
          paymentMethod,
          isCOD,
          customerName: name,
          customerPhone: phone,
          customerEmail: email,
          customerPincode: pincode
        };
        const res = await fetch('/api/bookings/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bookingData)
        });
        const data = await res.json();
        if (res.ok) {
          bookingMessage.textContent = 'Booking confirmed!';
          bookingMessage.className = 'text-green-600';
          setTimeout(closeModal, 2000);
        } else {
          bookingMessage.textContent = data.message || 'Booking failed';
          bookingMessage.className = 'text-red-500';
        }
      } catch (err) {
        bookingMessage.textContent = 'Network error';
        bookingMessage.className = 'text-red-500';
      }
    });

    // --- History Fetch ---
    fetchHistoryBtn.addEventListener('click', async function() {
      const email = historyEmail.value.trim();
      const phone = historyPhone.value.trim();
      if (!email && !phone) {
        historyList.innerHTML = '<p class="text-red-500">Please enter email or phone.</p>';
        return;
      }
      let url = '/api/bookings/customer?';
      if (email) url += `email=${encodeURIComponent(email)}`;
      else if (phone) url += `phone=${encodeURIComponent(phone)}`;
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('Failed to fetch history');
        const bookings = await res.json();
        if (bookings.length === 0) {
          historyList.innerHTML = '<p class="text-gray-500">No bookings found.</p>';
        } else {
          historyList.innerHTML = bookings.map(b => `
            <div class="bg-white p-3 rounded shadow flex flex-wrap justify-between items-center">
              <div>
                <p class="font-semibold">${b.serviceId.category} - ₹${b.amount}</p>
                <p class="text-sm text-gray-600">${new Date(b.date).toLocaleDateString()} at ${b.time}</p>
                <p class="text-sm">Provider: ${b.sellerId.name}</p>
              </div>
              <span class="px-3 py-1 rounded-full text-sm font-medium 
                ${b.status === 'Completed' ? 'bg-green-100 text-green-700' : 
                  b.status === 'Pending' ? 'bg-yellow-100 text-yellow-700' :
                  b.status === 'Accepted' ? 'bg-blue-100 text-blue-700' :
                  b.status === 'Cancelled' ? 'bg-red-100 text-red-700' :
                  'bg-gray-100 text-gray-700'}">
                ${b.status}
              </span>
            </div>
          `).join('');
        }
      } catch (err) {
        historyList.innerHTML = '<p class="text-red-500">Error fetching history.</p>';
      }
    });

    // --- Event Listeners ---
    searchBtn.addEventListener('click', loadServices);
    pincodeInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loadServices(); });
    sortSelect.addEventListener('change', () => renderServices(currentServices));
    categoryFilter.addEventListener('change', loadServices);
    locateBtn.addEventListener('click', getUserLocation);

    // --- Init ---
    getUserLocation();

    // Also if pincode is entered, load services on load? We'll load after location.
  </script>
</body>
</html>
